<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 40px; }
    .viewport { 
      width: 200px;
      height: 200px;
      border: 2px solid lime;
      overflow: hidden;
      position: relative;
      margin: 40px;
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
    }
    .item {
      width: 180px;
      height: 80px;
      margin: 10px;
      background: #333;
      border: 1px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }
    .set1 { background: #300; }
    .set2 { background: #030; }
    .set3 { background: #003; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
    #info { margin: 20px; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Infinite Scroll Test</h1>
  <div id="info">
    <div>Position: <span id="pos">0</span>px</div>
    <div>Set Showing: <span id="set">?</span></div>
    <div>Item Height: 100px (80px + 20px gap)</div>
    <div>Items per set: 3</div>
    <div>Total Height per set: 300px</div>
  </div>
  
  <button onclick="scrollUp()">Scroll Up (direction -1)</button>
  <button onclick="scrollDown()">Scroll Down (direction +1)</button>
  <button onclick="reset()">Reset to Middle</button>
  <button onclick="toggleAuto()">Toggle Auto Scroll</button>
  
  <div class="viewport">
    <div class="content" id="content">
      <!-- Set 1 -->
      <div class="item set1">Set 1 - Item A</div>
      <div class="item set1">Set 1 - Item B</div>
      <div class="item set1">Set 1 - Item C</div>
      
      <!-- Set 2 -->
      <div class="item set2">Set 2 - Item A</div>
      <div class="item set2">Set 2 - Item B</div>
      <div class="item set2">Set 2 - Item C</div>
      
      <!-- Set 3 -->
      <div class="item set3">Set 3 - Item A</div>
      <div class="item set3">Set 3 - Item B</div>
      <div class="item set3">Set 3 - Item C</div>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const totalHeight = 300; // 3 items * 100px
    let position = -totalHeight; // Start at middle set
    let autoScroll = false;
    let rafId = null;

    function updateDisplay() {
      content.style.transform = `translateY(${position}px)`;
      document.getElementById('pos').textContent = position.toFixed(1);
      
      if (position >= -100) document.getElementById('set').textContent = 'Set 1 (Red)';
      else if (position >= -400) document.getElementById('set').textContent = 'Set 2 (Green) ← MIDDLE';
      else document.getElementById('set').textContent = 'Set 3 (Blue)';
    }

    function scrollUp() {
      position -= 10;
      checkWrap();
      updateDisplay();
    }

    function scrollDown() {
      position += 10;
      checkWrap();
      updateDisplay();
    }

    function checkWrap() {
      if (position < -2 * totalHeight) {
        console.log(`WRAP UP: ${position.toFixed(1)} → ${(position + totalHeight).toFixed(1)}`);
        position += totalHeight;
      } else if (position > 0) {
        console.log(`WRAP DOWN: ${position.toFixed(1)} → ${(position - totalHeight).toFixed(1)}`);
        position -= totalHeight;
      }
    }

    function reset() {
      position = -totalHeight;
      updateDisplay();
    }

    function toggleAuto() {
      autoScroll = !autoScroll;
      if (autoScroll) {
        animate();
      } else if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    function animate() {
      position -= 0.5; // Scroll up slowly
      checkWrap();
      updateDisplay();
      if (autoScroll) {
        rafId = requestAnimationFrame(animate);
      }
    }

    // Initialize
    updateDisplay();
  </script>
</body>
</html>
