<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(138, 43, 226, 0.9);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgba(147, 51, 234, 0.7);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(126, 34, 206, 0.8);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="highlight" cx="35%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(255, 255, 255, 0.6);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255, 255, 255, 0);stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Head -->
  <ellipse cx="200" cy="150" rx="80" ry="100" fill="url(#glassGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Neck -->
  <rect x="170" y="230" width="60" height="50" fill="url(#glassGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Shoulders -->
  <ellipse cx="200" cy="300" rx="120" ry="60" fill="url(#glassGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Highlight -->
  <ellipse cx="200" cy="150" rx="80" ry="100" fill="url(#highlight)" opacity="0.5"/>
  
  <!-- Inner glow lines -->
  <line x1="200" y1="80" x2="200" y2="220" stroke="rgba(138, 43, 226, 0.4)" stroke-width="2"/>
  <line x1="140" y1="150" x2="260" y2="150" stroke="rgba(138, 43, 226, 0.4)" stroke-width="2"/>
</svg>
