<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    #log { white-space: pre; font-size: 12px; line-height: 1.4; }
    .wrap { color: lime; font-weight: bold; }
    button { padding: 10px 20px; margin: 10px 5px; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Infinite Scroll Wrap Logic Test</h2>
  <div>
    <strong>Config:</strong><br>
    totalHeight: 656px<br>
    scrollSpeed: 0.547px/frame<br>
    direction: -1 (bottom to top)<br>
    startPos: -656px (middle set)
  </div>
  <br>
  <button onclick="runTest()">Run Test (500 frames)</button>
  <button onclick="clearLog()">Clear Log</button>
  <br><br>
  <div id="log"></div>

  <script>
    const totalHeight = 656;
    const scrollSpeed = 0.547;
    const direction = -1;
    let position = -totalHeight;
    let frame = 0;
    const logEl = document.getElementById('log');

    function log(msg, isWrap = false) {
      const line = document.createElement('div');
      if (isWrap) line.className = 'wrap';
      line.textContent = msg;
      logEl.appendChild(line);
    }

    function clearLog() {
      logEl.innerHTML = '';
      position = -totalHeight;
      frame = 0;
      log(`Reset: position = ${position.toFixed(1)}px`);
    }

    function runTest() {
      clearLog();
      log(`Starting test...`);
      log(`Frame 0: position = ${position.toFixed(1)}px`);
      
      for (let i = 1; i <= 500; i++) {
        frame = i;
        const prevPos = position;
        position += direction * scrollSpeed;

        // Check for wrap
        if (position <= -2 * totalHeight) {
          const oldPos = position;
          position = position + totalHeight;
          log(`Frame ${frame}: WRAP! ${oldPos.toFixed(1)} → ${position.toFixed(1)}`, true);
        } else if (position >= 0) {
          const oldPos = position;
          position = position - totalHeight;
          log(`Frame ${frame}: WRAP! ${oldPos.toFixed(1)} → ${position.toFixed(1)}`, true);
        }

        // Log every 50 frames or on wrap
        if (frame % 50 === 0) {
          log(`Frame ${frame}: position = ${position.toFixed(1)}px`);
        }
      }

      log(`\nTest complete! Final position: ${position.toFixed(1)}px`);
    }
  </script>
</body>
</html>
